# Self-contained CMSIS-DAP config for STM32H743IITx
source E:/xpack-openocd-0.12.0-7/openocd/scripts/interface/cmsis-dap.cfg
transport select swd
adapter speed 1000

set WORKAREASIZE 0x8000
set CHIPNAME STM32H743IITx
set ENABLE_LOW_POWER 1
set STOP_WATCHDOG 1
set AP_NUM 0
set DUAL_BANK 1

# Hardware reset via SRST (without connect_assert_srst to avoid CMSIS-DAP errors)
reset_config srst_only

source E:/xpack-openocd-0.12.0-7/openocd/scripts/target/stm32h7x.cfg
